<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>东南亚与南亚国家概况 — 期末复习测验</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--gold:#d4a853;--gold-dim:rgba(212,168,83,0.12);--gold-glow:rgba(212,168,83,0.25);--text:#e6ddd0;--text-dim:#9d958a;--text-muted:#6b6560;--correct:#3d8b6e;--correct-bg:rgba(61,139,110,0.12);--wrong:#c44536;--wrong-bg:rgba(196,69,54,0.12);--border:rgba(255,255,255,0.06);--shadow:0 8px 40px rgba(0,0,0,0.5);--radius:16px;--transition:0.4s cubic-bezier(0.22,1,0.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Serif SC',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 30% 20%,rgba(212,168,83,0.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(180,140,60,0.03) 0%,transparent 60%),radial-gradient(ellipse at 50% 50%,rgba(255,255,255,0.015) 0%,transparent 100%)}
.app{width:100%;max-width:720px;padding:24px;position:relative}
.top-bar{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.top-bar .country-tag{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);background:var(--gold-dim);padding:5px 14px;border-radius:20px;white-space:nowrap}
.progress-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s cubic-bezier(.22,1,.36,1)}
.progress-text{font-size:13px;color:var(--text-dim);font-weight:500;min-width:52px;text-align:right;font-family:'Inter',sans-serif}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px 32px;box-shadow:var(--shadow);transition:var(--transition);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.question-number{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;font-family:'Inter',sans-serif}
.question-type{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;padding:3px 10px;border-radius:4px;margin-left:8px;text-transform:uppercase}
.type-choice{background:rgba(130,170,220,.15);color:#8ab4e0}
.type-tf{background:rgba(180,140,200,.15);color:#b890cc}
.type-blank{background:rgba(140,180,160,.15);color:#8cb4a0}
.question-text{font-family:'Noto Serif SC','Playfair Display',serif;font-size:20px;font-weight:600;line-height:1.6;color:var(--text);margin-bottom:28px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .25s ease;background:rgba(255,255,255,.015);position:relative;font-size:15px;line-height:1.5}
.option:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);transform:translateX(4px)}
.option .label{width:32px;height:32px;border-radius:50%;border:2px solid var(--text-muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--text-dim);flex-shrink:0;transition:all .25s ease;font-family:'Inter',sans-serif}
.option:hover .label{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.option.correct{border-color:var(--correct);background:var(--correct-bg);animation:pulse-green .6s ease}
.option.correct .label{border-color:var(--correct);background:var(--correct);color:#fff}
.option.wrong{border-color:var(--wrong);background:var(--wrong-bg);animation:shake .5s ease}
.option.wrong .label{border-color:var(--wrong);background:var(--wrong);color:#fff}
.option.show-correct{border-color:var(--correct);background:var(--correct-bg)}
.option.show-correct .label{border-color:var(--correct);background:var(--correct);color:#fff}
.option.disabled{pointer-events:none;opacity:.7}
.option.disabled:not(.correct):not(.wrong):not(.show-correct){opacity:.45}
.blank-input-wrap{display:flex;gap:12px;margin-bottom:16px}
.blank-input{flex:1;padding:14px 18px;border:2px solid var(--border);border-radius:12px;background:rgba(255,255,255,.03);color:var(--text);font-size:16px;font-family:'Noto Serif SC',serif;transition:all .25s ease;outline:none}
.blank-input:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-dim)}
.blank-input.correct-input{border-color:var(--correct);background:var(--correct-bg)}
.blank-input.wrong-input{border-color:var(--wrong);background:var(--wrong-bg)}
.blank-submit{padding:14px 24px;border:none;border-radius:12px;background:var(--gold);color:#1a1a2e;font-weight:700;font-size:14px;cursor:pointer;transition:all .25s ease;font-family:'Inter',sans-serif;white-space:nowrap}
.blank-submit:hover{filter:brightness(1.1);transform:translateY(-1px)}
.explanation{margin-top:20px;padding:16px 20px;border-radius:12px;background:var(--wrong-bg);border:1px solid rgba(196,69,54,.2);font-size:14px;line-height:1.7;color:#e8b4ad;display:none;animation:slideUp .35s ease}
.explanation.visible{display:block}
.explanation strong{color:#f0c0b8}
.explanation small{display:block;margin-top:6px;font-size:12px;line-height:1.8}
.actions{display:flex;justify-content:center;gap:12px;margin-top:24px;flex-wrap:wrap}
.btn{padding:12px 28px;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s ease;font-family:'Inter',sans-serif;border:none;letter-spacing:.02em}
.btn-primary{background:var(--gold);color:#1a1a2e}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 4px 20px var(--gold-glow)}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.num-nav{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;justify-content:center;max-height:132px;overflow-y:auto;padding:4px 0}
.num-dot{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:all .2s;color:var(--text-dim);background:rgba(255,255,255,.02);flex-shrink:0;font-family:'Inter',sans-serif}
.num-dot:hover{border-color:var(--gold);color:var(--gold);transform:scale(1.15)}
.num-dot.cur{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);font-weight:700;transform:scale(1.1)}
.num-dot.ok{border-color:var(--correct);background:var(--correct-bg);color:var(--correct)}
.num-dot.ng{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong)}
.score-display{display:flex;gap:20px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.score-item{text-align:center}
.score-value{font-size:28px;font-weight:700;font-family:'Inter',sans-serif;color:var(--gold)}
.score-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;font-family:'Inter',sans-serif}
.mode-selector{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.mode-btn{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s ease;font-family:'Inter',sans-serif;border:1px solid var(--border);background:transparent;color:var(--text-dim);letter-spacing:.04em}
.mode-btn:hover{border-color:var(--gold);color:var(--gold)}
.mode-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.start-screen,.result-screen{text-align:center}
.start-screen .card,.result-screen .card{padding:56px 40px}
.start-title{font-family:'Playfair Display','Noto Serif SC',serif;font-size:36px;font-weight:700;color:var(--gold);margin-bottom:12px}
.start-subtitle{font-size:15px;color:var(--text-dim);margin-bottom:32px;line-height:1.6}
.start-stats{display:flex;gap:32px;justify-content:center;margin-bottom:36px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:32px;font-weight:700;color:var(--text);font-family:'Inter',sans-serif}
.stat-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.result-title{font-family:'Playfair Display','Noto Serif SC',serif;font-size:32px;font-weight:700;margin-bottom:8px}
.result-msg{color:var(--text-dim);margin-bottom:24px}
.review-section{margin-top:28px;text-align:left}
.review-section h3{font-size:18px;color:var(--gold);margin-bottom:16px;text-align:center}
.review-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px;text-align:left}
.review-item .ri-q{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5}
.review-item .ri-meta{font-size:12px;color:var(--text-muted);margin-bottom:6px}
.review-item .ri-your{font-size:13px;color:#e8b4ad;margin-bottom:4px}
.review-item .ri-correct{font-size:13px;color:#8cb4a0}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulse-green{0%{box-shadow:0 0 0 0 rgba(61,139,110,.5)}70%{box-shadow:0 0 0 12px rgba(61,139,110,0)}100%{box-shadow:0 0 0 0 rgba(61,139,110,0)}}
.fade-in{animation:slideUp .4s ease}
.answer-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:13px;font-weight:600;background:var(--correct-bg);color:var(--correct);margin-left:6px}
@media(max-width:600px){.app{padding:12px}.card{padding:24px 20px 20px}.question-text{font-size:17px}.option{padding:12px 14px;font-size:14px}.start-stats{gap:20px}.start-title{font-size:28px}}
</style>
</head>
<body><div class="app" id="app"></div>
<script src="questions.js"></script>
<script>
const QB = window.QB||{};
let S = {mode:'all',questions:[],idx:0,score:0,wrong:0,answered:false,started:false,finished:false,wrongList:[],status:[]};
function jumpTo(i){if(i>=0&&i<S.questions.length){S.idx=i;S.answered=!!S.status[i];renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function buildQuestions(){
let qs=[];
if(S.mode==='all'||S.mode==='choice') QB.choice&&QB.choice.forEach((q,i)=>qs.push({...q,type:'choice'}));
if(S.mode==='all'||S.mode==='truefalse') QB.truefalse&&QB.truefalse.forEach((q,i)=>qs.push({...q,type:'truefalse'}));
if(S.mode==='all'||S.mode==='fillblank') QB.fillblank&&QB.fillblank.forEach((q,i)=>qs.push({...q,type:'fillblank'}));
S.questions=shuffle(qs);
S.status=new Array(S.questions.length).fill(null);
S.idx=0;S.score=0;S.wrong=0;S.answered=false;S.finished=false;S.wrongList=[];
}
function h(tag,attrs,...children){
const el=document.createElement(tag);
if(attrs) Object.entries(attrs).forEach(([k,v])=>{if(k==='className')el.className=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v);});
children.flat().forEach(c=>{if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c instanceof Node)el.appendChild(c);});
return el;
}
const A=document.getElementById('app');
function renderStart(){
const total=(QB.choice?.length||0)+(QB.truefalse?.length||0)+(QB.fillblank?.length||0);
A.innerHTML='';
A.appendChild(h('div',{className:'start-screen fade-in'},
h('div',{className:'card'},
h('div',{className:'start-title'},'期末复习测验'),
h('div',{className:'start-subtitle'},'东南亚与南亚国家概况 · 完整版<br>选择题 + 判断题 + 填空题 · 共'+total+'题'),
h('div',{className:'start-stats'},
h('div',{className:'stat-item'},h('div',{className:'stat-num'},String(total)),h('div',{className:'stat-label'},'总题数')),
h('div',{className:'stat-item'},h('div',{className:'stat-num'},String(QB.choice?.length||0)),h('div',{className:'stat-label'},'选择题')),
h('div',{className:'stat-item'},h('div',{className:'stat-num'},String(QB.truefalse?.length||0)),h('div',{className:'stat-label'},'判断题')),
h('div',{className:'stat-item'},h('div',{className:'stat-num'},String(QB.fillblank?.length||0)),h('div',{className:'stat-label'},'填空题'))),
h('div',{className:'mode-selector'},
h('button',{className:'mode-btn active',onClick:()=>{S.mode='all';updateBtns();}},'全部'),
h('button',{className:'mode-btn',onClick:()=>{S.mode='choice';updateBtns();}},'仅选择'),
h('button',{className:'mode-btn',onClick:()=>{S.mode='truefalse';updateBtns();}},'仅判断'),
h('button',{className:'mode-btn',onClick:()=>{S.mode='fillblank';updateBtns();}},'仅填空')),
h('button',{className:'btn btn-primary',style:'font-size:16px;padding:14px 48px;',onClick:startQuiz},'开始答题'))));
}
function updateBtns(){
document.querySelectorAll('.mode-btn').forEach(btn=>{
const m=btn.textContent.includes('全部')?'all':btn.textContent.includes('选择')?'choice':btn.textContent.includes('判断')?'truefalse':'fillblank';
btn.classList.toggle('active',S.mode===m);
});
}
function startQuiz(){buildQuestions();S.started=true;renderQ();}
function renderQ(){
if(S.finished){renderResult();return;}
const q=S.questions[S.idx];
A.innerHTML='';S.answered=false;
const tl=q.type==='choice'?'选择题':q.type==='truefalse'?'判断题':'填空题';
const tc=q.type==='choice'?'type-choice':q.type==='truefalse'?'type-tf':'type-blank';
const pct=((S.idx)/S.questions.length*100).toFixed(0);
const country=q.c||'';
const card=h('div',{className:'card fade-in'},
h('div',{className:'top-bar'},
country?h('div',{className:'country-tag'},country):null,
h('div',{className:'progress-wrap'},h('div',{className:'progress-fill',style:'width:'+pct+'%'})),
h('div',{className:'progress-text'},(S.idx+1)+'/'+S.questions.length)),
h('div',{className:'num-nav'},...S.questions.map((_,i)=>{let cls='num-dot';if(i===S.idx)cls+=' cur';else if(S.status[i]==='ok')cls+=' ok';else if(S.status[i]==='ng')cls+=' ng';return h('div',{className:cls,onClick:()=>jumpTo(i)},String(i+1));})),
h('div',{className:'question-number'},'第'+(S.idx+1)+'题',h('span',{className:'question-type '+tc},tl)),
h('div',{className:'question-text'},q.q),
h('div',{id:'answer-area'}),
h('div',{className:'explanation',id:'explanation'}),
h('div',{className:'actions',id:'actions'}));
A.appendChild(card);
const area=document.getElementById('answer-area');
if(q.type==='fillblank'){renderFillBlank(area,q);}else{renderOptions(area,q);}
}
function renderOptions(area,q){
const isTF=q.type==='truefalse';
const labels=isTF?['对','错']:['A','B','C','D'];
const texts=isTF?['正确 ✓','错误 ✗']:q.o;
const c=h('div',{className:'options'});
texts.forEach((t,i)=>{c.appendChild(h('div',{className:'option',onClick:()=>selectAnswer(i)},h('div',{className:'label'},labels[i]),h('div',{},t)));});
area.appendChild(c);
}
function renderFillBlank(area,q){
const parts=q.a.split(';');
const hint=parts.length>1?('（共'+parts.length+'个空，用空格或分号分隔）'):'';
const wrap=h('div',{className:'blank-input-wrap'});
const input=h('input',{className:'blank-input',type:'text',placeholder:hint||'输入你的答案...',id:'blank-input'});
const submit=h('button',{className:'blank-submit',onClick:checkFillBlank},'确认 ✓');
wrap.appendChild(input);wrap.appendChild(submit);
area.appendChild(wrap);
if(hint){area.insertBefore(h('div',{style:'font-size:12px;color:var(--text-muted);margin-bottom:8px;text-align:center'},hint),wrap);}
input.addEventListener('keydown',e=>{if(e.key==='Enter')checkFillBlank();});
}
function selectAnswer(idx){
if(S.answered)return;S.answered=true;
const q=S.questions[S.idx];
const correctIdx=q.type==='truefalse'?(q.a?0:1):(Array.isArray(q.a)?q.a:q.a);
const isMulti=Array.isArray(correctIdx);
const isCorrect=isMulti?correctIdx.includes(idx):idx===correctIdx;
const opts=document.querySelectorAll('.option');
opts.forEach(o=>o.classList.add('disabled'));
if(isCorrect){S.score++;S.status[S.idx]='ok';if(isMulti)correctIdx.forEach(ci=>opts[ci].classList.add('correct'));else opts[idx].classList.add('correct');}
else{S.wrong++;S.status[S.idx]='ng';opts[idx].classList.add('wrong');if(isMulti)correctIdx.forEach(ci=>opts[ci].classList.add('show-correct'));else opts[correctIdx].classList.add('show-correct');
const expl=document.getElementById('explanation');expl.className='explanation visible';expl.innerHTML='<strong>📖 解析：</strong>'+(q.e||'');
const label=q.type==='truefalse'?['对','错']:['A','B','C','D'];
const userAns=label[idx];const correctAns=isMulti?correctIdx.map(i=>label[i]).join('+'):label[correctIdx];
S.wrongList.push({q:q.q,userAnswer:userAns,correctAnswer:correctAns,type:q.type==='choice'?'选择题':'判断题',country:q.c||'',explanation:q.e||''});}
showNav();
}
function checkFillBlank(){
if(S.answered)return;S.answered=true;
const q=S.questions[S.idx];
const input=document.getElementById('blank-input');
const userAns=input.value.trim();
const answers=q.a.split(';');
const norm=s=>s.replace(/[\s，,。、；;：:！!？?\-\—]+/g,'').toLowerCase();
const nu=norm(userAns);
const partsResult=answers.map(ans=>{const na=norm(ans);if(nu===na)return true;if(na.length>=2&&nu.includes(na))return true;if(na.length>=2&&na.includes(nu)&&nu.length>=2)return true;if(answers.length>1&&nu.includes(na)&&na.length>=2)return true;return false;});
const matchCount=partsResult.filter(Boolean).length;
const isCorrect=matchCount===answers.length;
if(isCorrect){S.score++;S.status[S.idx]='ok';input.classList.add('correct-input');input.disabled=true;document.querySelector('.blank-submit').disabled=true;}
else{S.wrong++;S.status[S.idx]='ng';input.classList.add('wrong-input');input.disabled=true;document.querySelector('.blank-submit').disabled=true;
const expl=document.getElementById('explanation');expl.className='explanation visible';
if(answers.length>1){const fb=answers.map((a,i)=>partsResult[i]?'<span style="color:#8cb4a0">✓'+a+'</span>':'<span style="color:#e8b4ad">✗'+a+'</span>').join(' ；');expl.innerHTML='<strong>📖 正确答案：</strong>'+answers.join('；')+'<br><small>你的答案：'+(userAns||'(空)')+'<br>'+fb+'</small>';}
else{expl.innerHTML='<strong>📖 正确答案：</strong>'+answers.join('；');}
S.wrongList.push({q:q.q,userAnswer:userAns||'(空)',correctAnswer:answers.join('；'),type:'填空题',country:q.c||'',explanation:''});}
showNav();
}
function showNav(){
const actions=document.getElementById('actions');actions.innerHTML='';
if(S.idx<S.questions.length-1){actions.appendChild(h('button',{className:'btn btn-primary',onClick:nextQ},'下一题 →'));}
else{actions.appendChild(h('button',{className:'btn btn-primary',onClick:finish},'查看结果 ✨'));}
}
function nextQ(){S.idx++;S.answered=false;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function finish(){S.finished=true;renderResult();}
function renderResult(){
const total=S.questions.length;const pct=total>0?Math.round(S.score/total*100):0;
let emoji,msg,color;
if(pct>=90){emoji='🏆';msg='掌握得非常扎实！';color='#d4a853';}
else if(pct>=70){emoji='👍';msg='不错，继续加油！';color='#8ab4e0';}
else if(pct>=50){emoji='📚';msg='还需努力，建议加强复习。';color='#e8b45a';}
else{emoji='💪';msg='基础较薄弱，建议系统复习。';color='#c47858';}
A.innerHTML='';
A.appendChild(h('div',{className:'result-screen fade-in'},h('div',{className:'card'},
h('div',{style:'fontSize:48px;marginBottom:8px'},emoji),
h('div',{className:'result-title',style:'color:'+color},pct+' 分'),
h('div',{className:'result-msg'},msg),
h('div',{className:'score-display'},
h('div',{className:'score-item'},h('div',{className:'score-value',style:'color:#3d8b6e'},String(S.score)),h('div',{className:'score-label'},'✅ 正确')),
h('div',{className:'score-item'},h('div',{className:'score-value',style:'color:#c44536'},String(S.wrong)),h('div',{className:'score-label'},'❌ 错误')),
h('div',{className:'score-item'},h('div',{className:'score-value'},String(total)),h('div',{className:'score-label'},'📝 总题数'))),
