<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>期末复习测验</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--gold:#d4a853;--gold-dim:rgba(212,168,83,0.12);--text:#e6ddd0;--text-dim:#9d958a;--correct:#3d8b6e;--wrong:#c44536;--border:rgba(255,255,255,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 30% 20%,rgba(212,168,83,0.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(180,140,60,0.03) 0%,transparent 60%)}
.app{width:100%;max-width:720px;padding:24px}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.country-tag{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);background:var(--gold-dim);padding:4px 12px;border-radius:16px;white-space:nowrap}
.progress-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);transition:width .5s cubic-bezier(.22,1,.36,1)}
.progress-text{font-size:12px;color:var(--text-dim);min-width:45px;text-align:right}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px 24px;box-shadow:0 8px 40px rgba(0,0,0,0.5);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.q-num{font-size:11px;font-weight:600;letter-spacing:.1em;color:#6b6560;text-transform:uppercase;margin-bottom:6px}
.q-type{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;padding:2px 8px;border-radius:4px;margin-left:6px;text-transform:uppercase}
.t-choice{background:rgba(130,170,220,.15);color:#8ab4e0}
.t-tf{background:rgba(180,140,200,.15);color:#b890cc}
.t-blank{background:rgba(140,180,160,.15);color:#8cb4a0}
.q-text{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:600;line-height:1.6;color:var(--text);margin-bottom:24px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .25s ease;background:rgba(255,255,255,.015);font-size:14px;line-height:1.4}
.opt:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);transform:translateX(4px)}
.opt .lbl{width:28px;height:28px;border-radius:50%;border:2px solid #6b6560;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--text-dim);flex-shrink:0;transition:all .25s ease}
.opt:hover .lbl{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.opt.correct{border-color:var(--correct);background:rgba(61,139,110,0.12);animation:pulse .6s ease}
.opt.correct .lbl{border-color:var(--correct);background:var(--correct);color:#fff}
.opt.wrong{border-color:var(--wrong);background:rgba(196,69,54,0.12);animation:shake .5s ease}
.opt.wrong .lbl{border-color:var(--wrong);background:var(--wrong);color:#fff}
.opt.show-correct{border-color:var(--correct);background:rgba(61,139,110,0.12)}
.opt.show-correct .lbl{border-color:var(--correct);background:var(--correct);color:#fff}
.opt.disabled{pointer-events:none;opacity:.7}
.opt.disabled:not(.correct):not(.wrong):not(.show-correct){opacity:.4}
.blk-wrap{display:flex;gap:10px;margin-bottom:16px}
.blk-inp{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:10px;background:rgba(255,255,255,.03);color:var(--text);font-size:16px;font-family:'Noto Serif SC',serif;outline:none}
.blk-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.blk-inp.correct{border-color:var(--correct);background:rgba(61,139,110,0.12)}
.blk-inp.wrong{border-color:var(--wrong);background:rgba(196,69,54,0.12)}
.blk-submit{padding:12px 20px;border:none;border-radius:10px;background:var(--gold);color:#1a1a2e;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap}
.blk-submit:hover{filter:brightness(1.1)}
.expl{margin-top:16px;padding:14px 18px;border-radius:10px;background:rgba(196,69,54,0.12);border:1px solid rgba(196,69,54,.2);font-size:13px;line-height:1.6;color:#e8b4ad;display:none;animation:slideUp .35s ease}
.expl.show{display:block}
.expl strong{color:#f0c0b8}
.actions{display:flex;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s ease;border:none;letter-spacing:.02em}
.btn-p{background:var(--gold);color:#1a1a2e}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 4px 16px var(--gold-dim)}
.btn-s{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-s:hover{border-color:var(--gold);color:var(--gold)}
.score-row{display:flex;gap:16px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.score-item{text-align:center}
.score-val{font-size:26px;font-weight:700;color:var(--gold)}
.score-lbl{font-size:10px;color:#6b6560;text-transform:uppercase;letter-spacing:.08em}
.modes{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.m-btn{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;transition:all .25s ease;border:1px solid var(--border);background:transparent;color:var(--text-dim);letter-spacing:.04em}
.m-btn:hover{border-color:var(--gold);color:var(--gold)}
.m-btn.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.start,.result{text-align:center}
.start .card,.result .card{padding:48px 32px}
.s-title{font-size:32px;font-weight:700;color:var(--gold);margin-bottom:8px}
.s-sub{font-size:14px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}
.s-stats{display:flex;gap:24px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.stat-i{text-align:center}
.stat-n{font-size:28px;font-weight:700;color:var(--text)}
.stat-l{font-size:11px;color:#6b6560;text-transform:uppercase;letter-spacing:.08em}
.r-title{font-size:28px;font-weight:700;margin-bottom:6px}
.r-msg{color:var(--text-dim);margin-bottom:20px;font-size:14px}
.review{margin-top:24px;text-align:left}
.review h3{font-size:16px;color:var(--gold);margin-bottom:12px;text-align:center}
.rv-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;text-align:left}
.rv-item .rv-q{font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.4}
.rv-item .rv-meta{font-size:11px;color:#6b6560;margin-bottom:4px}
.rv-item .rv-you{font-size:12px;color:#e8b4ad;margin-bottom:2px}
.rv-item .rv-correct{font-size:12px;color:#8cb4a0}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,139,110,.5)}70%{box-shadow:0 0 0 10px rgba(61,139,110,0)}100%{box-shadow:0 0 0 0 rgba(61,139,110,0)}}
.fade-in{animation:slideUp .4s ease}
@media(max-width:600px){.app{padding:8px}.card{padding:20px 16px 16px}.q-text{font-size:16px}.opt{padding:10px 12px;font-size:13px}.s-title{font-size:24px}}
</style>
</head>
<body><div class="app" id="app"></div>
<script src="https://cdn.jsdelivr.net/gh/17806947696q-arch/southeast-asia-quiz@main/questions.js"></script>
<script>
let S={mode:'all',questions:[],idx:0,score:0,wrong:0,answered:false,started:false,finished:false,wrongList:[]};
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function buildQuestions(){
let qs=[];
if(S.mode==='all'||S.mode==='choice') QB.choice.forEach((q,i)=>qs.push({...q,type:'choice'}));
if(S.mode==='all'||S.mode==='truefalse') QB.truefalse.forEach((q,i)=>qs.push({...q,type:'truefalse'}));
if(S.mode==='all'||S.mode==='fillblank') QB.fillblank.forEach((q,i)=>qs.push({...q,type:'fillblank'}));
S.questions=shuffle(qs);S.idx=0;S.score=0;S.wrong=0;S.answered=false;S.finished=false;S.wrongList=[];
}
function h(tag,attrs,...children){
const el=document.createElement(tag);
if(attrs) Object.entries(attrs).forEach(([k,v])=>{if(k==='className')el.className=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v);});
children.flat().forEach(c=>{if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c instanceof Node)el.appendChild(c);});
return el;
}
const A=document.getElementById('app');
function renderStart(){
const total=(QB.choice?.length||0)+(QB.truefalse?.length||0)+(QB.fillblank?.length||0);
A.innerHTML='';
A.appendChild(h('div',{className:'start fade-in'},h('div',{className:'card'},
h('div',{className:'s-title'},'期末复习测验'),
h('div',{className:'s-sub'},'东南亚与南亚国家概况 · 完整版<br>选择题+判断题+填空题 · 共'+total+'题'),
h('div',{className:'s-stats'},
h('div',{className:'stat-i'},h('div',{className:'stat-n'},String(total)),h('div',{className:'stat-l'},'总题数')),
h('div',{className:'stat-i'},h('div',{className:'stat-n'},String(QB.choice?.length||0)),h('div',{className:'stat-l'},'选择题')),
h('div',{className:'stat-i'},h('div',{className:'stat-n'},String(QB.truefalse?.length||0)),h('div',{className:'stat-l'},'判断题')),
h('div',{className:'stat-i'},h('div',{className:'stat-n'},String(QB.fillblank?.length||0)),h('div',{className:'stat-l'},'填空题'))),
h('div',{className:'modes'},
h('button',{className:'m-btn on',onClick:()=>{S.mode='all';updateBtns();}},'全部'),
h('button',{className:'m-btn',onClick:()=>{S.mode='choice';updateBtns();}},'仅选择'),
h('button',{className:'m-btn',onClick:()=>{S.mode='truefalse';updateBtns();}},'仅判断'),
h('button',{className:'m-btn',onClick:()=>{S.mode='fillblank';updateBtns();}},'仅填空')),
h('button',{className:'btn btn-p',style:'font-size:16px;padding:14px 40px;',onClick:startQuiz},'开始答题'))));
}
function updateBtns(){
document.querySelectorAll('.m-btn').forEach(btn=>{
const t=btn.textContent;const m=t==='全部'?'all':t==='仅选择'?'choice':t==='仅判断'?'truefalse':'fillblank';
btn.classList.toggle('on',S.mode===m);
});
}
function startQuiz(){buildQuestions();S.started=true;renderQ();}
function renderQ(){
if(S.finished){renderResult();return;}
const q=S.questions[S.idx];
A.innerHTML='';S.answered=false;
const tl=q.type==='choice'?'选择题':q.type==='truefalse'?'判断题':'填空题';
const tc=q.type==='choice'?'t-choice':q.type==='truefalse'?'t-tf':'t-blank';
const pct=((S.idx)/S.questions.length*100).toFixed(0);
const card=h('div',{className:'card fade-in'},
h('div',{className:'top-bar'},
q.c?h('div',{className:'country-tag'},q.c):null,
h('div',{className:'progress-wrap'},h('div',{className:'progress-fill',style:'width:'+pct+'%'})),
h('div',{className:'progress-text'},(S.idx+1)+'/'+S.questions.length)),
h('div',{className:'q-num'},'第'+(S.idx+1)+'题',h('span',{className:'q-type '+tc},tl)),
h('div',{className:'q-text'},q.q),
h('div',{id:'answer-area'}),
h('div',{className:'expl',id:'expl'}),
h('div',{className:'actions',id:'actions'}));
A.appendChild(card);
const area=document.getElementById('answer-area');
if(q.type==='fillblank'){renderBlank(area,q);}else{renderOpts(area,q);}
}
function renderOpts(area,q){
const isTF=q.type==='truefalse';
const labels=isTF?['对','错']:['A','B','C','D'];
const texts=isTF?['正确','错误']:q.o;
const c=h('div',{className:'opts'});
texts.forEach((t,i)=>{c.appendChild(h('div',{className:'opt',onClick:()=>selectAnswer(i)},h('div',{className:'lbl'},labels[i]),h('div',{},t)));});
area.appendChild(c);
}
function renderBlank(area,q){
const w=h('div',{className:'blk-wrap'});
const inp=h('input',{className:'blk-inp',type:'text',placeholder:'输入答案...',id:'blk-inp'});
const sub=h('button',{className:'blk-submit',onClick:checkBlank},'确认');
w.appendChild(inp);w.appendChild(sub);area.appendChild(w);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkBlank();});
}
function selectAnswer(idx){
if(S.answered)return;S.answered=true;
const q=S.questions[S.idx];
const correctIdx=q.type==='truefalse'?(q.a?0:1):(Array.isArray(q.a)?q.a:q.a);
const isMulti=Array.isArray(correctIdx);
const isCorrect=isMulti?correctIdx.includes(idx):idx===correctIdx;
const opts=document.querySelectorAll('.opt');
opts.forEach(o=>o.classList.add('disabled'));
if(isCorrect){S.score++;if(isMulti)correctIdx.forEach(ci=>opts[ci].classList.add('correct'));else opts[idx].classList.add('correct');}
else{S.wrong++;opts[idx].classList.add('wrong');if(isMulti)correctIdx.forEach(ci=>opts[ci].classList.add('show-correct'));else opts[correctIdx].classList.add('show-correct');
const expl=document.getElementById('expl');expl.className='expl show';expl.innerHTML='<strong>解析：</strong>'+(q.e||'');
const label=q.type==='truefalse'?['对','错']:['A','B','C','D'];
const userAns=label[idx];const correctAns=isMulti?correctIdx.map(i=>label[i]).join('+'):label[correctIdx];
S.wrongList.push({q:q.q,ua:userAns,ca:correctAns,type:tl(q.type),country:q.c||'',expl:q.e||''});}
showNav();
}
function checkBlank(){
if(S.answered)return;S.answered=true;
const q=S.questions[S.idx];
const inp=document.getElementById('blk-inp');
const userAns=inp.value.trim();
const answers=q.a.split(';');
let isCorrect=false;
for(const ans of answers){if(userAns===ans||userAns.includes(ans)||ans.includes(userAns)){isCorrect=true;break;}}
if(!isCorrect&&answers.length>1){let mc=0;for(const ans of answers){if(userAns.includes(ans))mc++;}if(mc>=answers.length*0.5)isCorrect=true;}
const wrap=document.querySelector('.blk-wrap');
if(isCorrect){S.score++;inp.classList.add('correct');inp.disabled=true;document.querySelector('.blk-submit').disabled=true;}
else{S.wrong++;inp.classList.add('wrong');inp.disabled=true;document.querySelector('.blk-submit').disabled=true;
const expl=document.getElementById('expl');expl.className='expl show';expl.innerHTML='<strong>正确答案：</strong>'+answers.join('；');
S.wrongList.push({q:q.q,ua:userAns||'(空)',ca:answers.join('；'),type:'填空题',country:q.c||'',expl:''});}
showNav();
}
function tl(t){return t==='choice'?'选择题':t==='truefalse'?'判断题':'填空题';}
function showNav(){
const actions=document.getElementById('actions');actions.innerHTML='';
if(S.idx<S.questions.length-1){actions.appendChild(h('button',{className:'btn btn-p',onClick:nextQ},'下一题'));}
else{actions.appendChild(h('button',{className:'btn btn-p',onClick:finish},'查看结果'));}
}
function nextQ(){S.idx++;S.answered=false;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function finish(){S.finished=true;renderResult();}
function renderResult(){
const total=S.questions.length;const pct=total>0?Math.round(S.score/total*100):0;
let emoji,msg,color;
if(pct>=90){emoji='🏆';msg='掌握得非常扎实！';color='#d4a853';}
else if(pct>=70){emoji='👍';msg='不错，继续加油！';color='#8ab4e0';}
else if(pct>=50){emoji='📚';msg='还需努力，建议加强复习。';color='#e8b45a';}
else{emoji='💪';msg='基础较薄弱，建议系统复习。';color='#c47858';}
A.innerHTML='';
A.appendChild(h('div',{className:'result fade-in'},h('div',{className:'card'},
h('div',{style:'fontSize:48px;marginBottom:8px'},emoji),
h('div',{className:'r-title',style:'color:'+color},pct+' 分'),
h('div',{className:'r-msg'},msg),
h('div',{className:'score-row'},
h('div',{className:'score-item'},h('div',{className:'score-val',style:'color:#3d8b6e'},String(S.score)),h('div',{className:'score-lbl'},'正确')),
h('div',{className:'score-item'},h('div',{className:'score-val',style:'color:#c44536'},String(S.wrong)),h('div',{className:'score-lbl'},'错误')),
h('div',{className:'score-item'},h('div',{className:'score-val'},String(total)),h('div',{className:'score-lbl'},'总题数'))),
S.wrongList.length>0?h('div',{className:'review'},h('h3','错题复盘 ('+S.wrongList.length+'题)'),...S.wrongList.map(w=>h('div',{className:'rv-item'},h('div',{className:'rv-meta'},w.type+(w.country?' · '+w.country:'')),h('div',{className:'rv-q'},w.q),h('div',{className:'rv-you'},'你的答案：'+w.ua),h('div',{className:'rv-correct'},'正确答案：'+w.ca),w.expl?h('div',{style:'fontSize:11px;color:var(--text-dim);marginTop:3px'},w.expl):null))):h('div',{style:'marginTop:12px;color:var(--correct);fontSize:15px'},'全部答对！'),
h('div',{className:'actions',style:'marginTop:24px'},
h('button',{className:'btn btn-p',onClick:()=>{buildQuestions();S.finished=false;renderQ();window.scrollTo(0,0);}},'重新答题'),
h('button',{className:'btn btn-s',onClick:()=>{renderStart();}},'返回首页')))));
}
renderStart();
</script>
</body>
</html>
